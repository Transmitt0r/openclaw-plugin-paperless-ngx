name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm run lint

      - run: pnpm run test

  tag-release:
    needs: build-lint-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # package.json version bumps should ship themselves: tag it here so the
      # push triggers publish.yml, instead of relying on someone remembering
      # to push a matching tag by hand after merging the bump.
      - name: Tag release if package.json version is new
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="v$(node -p "require('./package.json').version")"
          if git rev-parse "$version" >/dev/null 2>&1; then
            echo "Tag $version already exists, nothing to do"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$version" -m "$version"
          git push origin "$version"
          # A tag pushed with the default GITHUB_TOKEN doesn't trigger other
          # workflows (GitHub suppresses that to prevent recursive runs);
          # workflow_dispatch is explicitly exempted from that rule, so kick
          # off the publish workflow directly instead of relying on its
          # `push: tags` trigger.
          gh workflow run publish.yml --ref "$version"
