name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # required for npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm run test

      # Trusted publishing requires npm CLI >=11.5.1; the version bundled
      # with a given Node release can lag behind that, so pin explicitly
      # rather than relying on whatever setup-node happens to install.
      - run: npm install -g npm@latest

      # No token: this repo/workflow is registered as a trusted publisher
      # for @transmitt0r/openclaw-plugin-paperless-ngx on npmjs.com, so npm
      # authenticates via the id-token OIDC claim above and also attaches
      # provenance automatically.
      - run: npm publish

      # Publishing to ClawHub is a separate, manual step for now (`clawhub
      # package publish transmitt0r/openclaw-plugin-paperless-ngx`).
      - run: npm pack --pack-destination /tmp

      - uses: softprops/action-gh-release@v3
        with:
          files: /tmp/*.tgz
          generate_release_notes: true
