name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to publish a GitHub release and push the release tag
      issues: write # to comment on released issues
      pull-requests: write # to comment on released pull requests
      id-token: write # to enable OIDC for npm trusted publishing/provenance

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # semantic-release needs full tag history

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
          # No registry-url here: it writes an .npmrc that conflicts with
          # @semantic-release/npm's own OIDC trusted-publishing auth.

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm run lint

      - run: pnpm run test

      # Trusted publishing requires npm CLI >=11.5.1; the version bundled
      # with a given Node release can lag behind that, so pin explicitly
      # rather than relying on whatever setup-node happens to install.
      - run: npm install -g npm@latest

      - run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
